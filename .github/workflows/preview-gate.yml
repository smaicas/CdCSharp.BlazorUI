# .github/workflows/preview-gate.yml
# Quality gates for previews - runs on PRs to develop
# Verifies build, test and coverage before merging to develop

name: Preview Gate

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]
  
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.100'

permissions:
  contents: read

concurrency:
  group: preview-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Build (Release)
        run: dotnet build CdCSharp.BlazorUI.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test CdCSharp.BlazorUI.slnx -c Release --no-build --verbosity normal

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Build (Debug for coverage)
        run: dotnet build CdCSharp.BlazorUI.slnx -c Debug --no-restore

      - name: Test with coverage
        run: |
          dotnet test CdCSharp.BlazorUI.slnx -c Debug --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ./coverage/**/coverage.cobertura.xml
          retention-days: 7

  public-api-check:
    name: Check Public API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Check PublicAPI changes
        run: |
          echo "=== Verificando cambios en PublicAPI ==="
          
          # Verificar que no haya cambios en PublicAPI.Shipped.txt
          SHIPPED_CHANGES=$(git diff --name-only origin/develop...HEAD | grep -i "PublicAPI.Shipped.txt" || true)
          
          if [ -n "$SHIPPED_CHANGES" ]; then
            echo "❌ ERROR: Se detectaron cambios en PublicAPI.Shipped.txt"
            echo "Los cambios en Shipped.txt solo deben hacerse durante el release"
            echo "Archivos modificados:"
            echo "$SHIPPED_CHANGES"
            exit 1
          else
            echo "✅ No hay cambios en PublicAPI.Shipped.txt"
          fi

      - name: Build para verificar API
        run: dotnet build CdCSharp.BlazorUI.slnx -c Release --no-restore

  summary:
    name: Preview Gate Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, coverage, public-api-check]
    if: always()
    
    steps:
      - name: Generate summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              build: '${{ needs.build-and-test.result }}',
              coverage: '${{ needs.coverage.result }}',
              publicApi: '${{ needs.public-api-check.result }}'
            };
            
            let allPassed = true;
            let report = '## Preview Gate Results\n\n';
            
            for (const [name, result] of Object.entries(jobs)) {
              const icon = result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';
              report += `- ${icon} **${name}**: ${result}\n`;
              if (result !== 'success' && result !== 'skipped') {
                allPassed = false;
              }
            }
            
            report += '\n';
            
            if (allPassed) {
              report += '### ✅ Preview Gate Passed\n\n';
              report += 'Ready to merge into develop.';
            } else {
              report += '### ❌ Preview Gate Failed\n\n';
              report += 'There are issues that need to be resolved.';
            }
            
            core.summary.addRaw(report).write();
            
            if (!allPassed) {
              core.setFailed('Preview gate failed');
            }
