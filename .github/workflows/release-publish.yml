# .github/workflows/release-publish.yml
# Publica releases estables en tags v*
# Crea GitHub release y publica a NuGet

name: Release Publish

on:
  push:
    tags: ['v*']

env:
  DOTNET_VERSION: '10.0.100'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Build (Release)
        run: dotnet build CdCSharp.BlazorUI.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test CdCSharp.BlazorUI.slnx -c Release --no-build --verbosity normal

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Pack packages
        run: |
          dotnet pack CdCSharp.BlazorUI.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.version }} \
            -p:FileVersion=${{ needs.version.outputs.version }} \
            -p:InformationalVersion=${{ needs.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: production
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.version.outputs.version }}
          body: |
            ## 🎉 Release ${{ needs.version.outputs.version }}

            ### 📦 Packages
            - CdCSharp.BlazorUI
            - CdCSharp.BlazorUI.Core
            - CdCSharp.BlazorUI.SyntaxHighlight
            - CdCSharp.BlazorUI.Localization.Server
            - CdCSharp.BlazorUI.Localization.Wasm
            - CdCSharp.BlazorUI.FluentValidation
            - CdCSharp.BlazorUI.BuildTools

            ### 🔧 Installation
            ```bash
            dotnet add package CdCSharp.BlazorUI --version ${{ needs.version.outputs.version }}
            ```
          draft: false
          prerelease: false
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
