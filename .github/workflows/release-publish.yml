# .github/workflows/release-publish.yml
# Publishes stable releases on tags v*
# Creates GitHub release and publishes to NuGet

name: Release Publish

on:
  push:
    tags: ['v*']

env:
  DOTNET_VERSION: '10.0.100'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Build (Release)
        run: dotnet build CdCSharp.BlazorUI.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test CdCSharp.BlazorUI.slnx -c Release --no-build --verbosity normal

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Pack packages
        run: |
          dotnet pack CdCSharp.BlazorUI.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.version }} \
            -p:FileVersion=${{ needs.version.outputs.version }} \
            -p:InformationalVersion=${{ needs.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION='${{ needs.version.outputs.version }}'
          # Capture the body of the `## [VERSION]` section: skip the header,
          # stop at the next `## [` heading or the link-reference footer
          # (`---`). Fail loudly if the section is missing so a mistagged
          # release does not ship empty notes.
          sed -n "/^## \[$VERSION\]/,\$p" CHANGELOG.md \
            | sed -n '2,$p' \
            | sed -e '/^## \[/,$d' -e '/^---$/,$d' \
            > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::CHANGELOG.md is missing a [$VERSION] section" >&2
            exit 1
          fi
          {
            echo ''
            echo '### Installation'
            echo '```bash'
            echo "dotnet add package CdCSharp.BlazorUI --version $VERSION"
            echo '```'
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
