# Workflow para configurar el repositorio (labels, branch protection)
# Ejecutar manualmente desde GitHub Actions cuando se necesite
name: Setup Repository

on:
  workflow_dispatch:
    inputs:
      setup_labels:
        description: 'Crear labels de severity'
        type: boolean
        default: true
      setup_branch_protection:
        description: 'Configurar branch protection (requiere token con permisos admin)'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write
  # adminstration: write  # Descomentar si el token tiene permisos de admin

jobs:
  setup-labels:
    name: Setup Labels
    runs-on: ubuntu-latest
    if: inputs.setup_labels
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Creando labels de severity ==="
          
          # Labels de severity para release-gate.yml
          declare -a labels=(
            "severity:blocker:d9534f:Bloquea el release - debe resolverse antes de publicar"
            "severity:critical:e74c3c:Problema crítico - alta prioridad"
            "severity:major:f39c12:Problema importante - afecta funcionalidad"
            "severity:minor:f1c40f:Problema menor - mejora deseable"
            "severity:polish:2ecc71:Refinamiento - calidad de vida"
          )
          
          for label_info in "${labels[@]}"; do
            IFS=':' read -r name color description <<< "$label_info"
            
            # Verificar si existe
            if gh label list --json name --jq ".[] | select(.name==\"$name\")" | grep -q "$name"; then
              echo "Actualizando label: $name"
              gh label edit "$name" --color "$color" --description "$description" || true
            else
              echo "Creando label: $name"
              gh label create "$name" --color "$color" --description "$description" || true
            fi
          done
          
          echo ""
          echo "=== Labels configurados ==="
          gh label list --search "severity:"
          
      - name: Summary
        run: |
          echo "## Labels configurados ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Label | Descripción |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`severity:blocker\` | Bloquea el release |" >> $GITHUB_STEP_SUMMARY
          echo "| \`severity:critical\` | Problema crítico |" >> $GITHUB_STEP_SUMMARY
          echo "| \`severity:major\` | Problema importante |" >> $GITHUB_STEP_SUMMARY
          echo "| \`severity:minor\` | Problema menor |" >> $GITHUB_STEP_SUMMARY
          echo "| \`severity:polish\` | Refinamiento |" >> $GITHUB_STEP_SUMMARY

  setup-branch-protection:
    name: Setup Branch Protection
    runs-on: ubuntu-latest
    if: inputs.setup_branch_protection
    # Este job requiere un token con permisos de administrador
    # Si falla, configura manualmente en Settings > Branches
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Branch Protection for main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Configurando branch protection para main ==="
          
          REPO="${{ github.repository }}"
          
          # Crear archivo JSON temporal
          cat > /tmp/main-protection.json << 'JSONEOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Release Gate / Build Check",
                "Release Gate / Check Blocking Issues",
                "Release Gate / Check Public API"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_linear_history": true,
            "allow_merge_commit": false,
            "allow_squash_merge": true,
            "allow_rebase_merge": false
          }
          JSONEOF
          
          echo "Aplicando configuración a main..."
          gh api repos/$REPO/branches/main/protection \
            --method PUT \
            --input /tmp/main-protection.json || {
              echo "⚠️ Error configurando main. Puede necesitar permisos de administrador."
              echo "Configura manualmente en Settings > Branches"
            }
          
      - name: Setup Branch Protection for develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Configurando branch protection para develop ==="
          
          REPO="${{ github.repository }}"
          
          # Crear archivo JSON temporal
          cat > /tmp/develop-protection.json << 'JSONEOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Preview Gate / Build & Test",
                "Preview Gate / Code Coverage",
                "Preview Gate / Check Public API"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_linear_history": true,
            "allow_merge_commit": false,
            "allow_squash_merge": true,
            "allow_rebase_merge": false
          }
          JSONEOF
          
          echo "Aplicando configuración a develop..."
          gh api repos/$REPO/branches/develop/protection \
            --method PUT \
            --input /tmp/develop-protection.json || {
              echo "⚠️ Error configurando develop. Puede necesitar permisos de administrador."
              echo "Configura manualmente en Settings > Branches"
            }
          
      - name: Summary
        run: |
          echo "## Branch Protection configurado ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### main:" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere PR + 1 approval" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere: Release Gate / Build Check" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere: Release Gate / Check Blocking Issues" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere: Release Gate / Check Public API" >> $GITHUB_STEP_SUMMARY
          echo "- Squash merge only" >> $GITHUB_STEP_SUMMARY
          echo "- Historial lineal" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### develop:" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere PR + 1 approval" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere: Preview Gate / Build & Test" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere: Preview Gate / Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Requiere: Preview Gate / Check Public API" >> $GITHUB_STEP_SUMMARY
          echo "- Squash merge only" >> $GITHUB_STEP_SUMMARY
          echo "- Historial lineal" >> $GITHUB_STEP_SUMMARY
