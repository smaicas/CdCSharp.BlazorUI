# .github/workflows/preview.yml
# Publica versiones preview automáticamente en cada push a develop
# Versión calculada: X.Y+1.0-preview.N (N = commits desde último tag en main)

name: Publish Preview

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.100'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      full_version: ${{ steps.calc.outputs.full_version }}
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate preview version
        id: calc
        run: |
          # Obtener último tag en main (formato vX.Y.Z)
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]" origin/main 2>/dev/null || echo "v0.0.0")
          echo "Last tag on main: $LAST_TAG"
          
          # Parsear versión
          MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LAST_TAG | cut -d. -f2)
          PATCH=$(echo $LAST_TAG | cut -d. -f3)
          
          # Incrementar minor para preview
          NEXT_MINOR=$((MINOR + 1))
          
          # Contar commits desde último tag
          COMMITS=$(git rev-list --count $LAST_TAG..HEAD)
          
          # Construir versión
          VERSION="${MAJOR}.${NEXT_MINOR}.0-preview.${COMMITS}"
          FULL_VERSION="${MAJOR}.${NEXT_MINOR}.0-preview.${COMMITS}+${GITHUB_SHA:0:7}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          
          echo "Calculated version: $VERSION"
          echo "Full version: $FULL_VERSION"

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Build (Release)
        run: dotnet build CdCSharp.BlazorUI.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test CdCSharp.BlazorUI.slnx -c Release --no-build --verbosity normal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ needs.version.outputs.version }}
          path: |
            src/**/bin/Release/
            !src/**/bin/**/*.symbols.nupkg
          retention-days: 1

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [version, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Pack packages
        run: |
          dotnet pack CdCSharp.BlazorUI.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.version }} \
            -p:FileVersion=${{ needs.version.outputs.version }} \
            -p:InformationalVersion=${{ needs.version.outputs.full_version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts

      - name: Verify packages
        run: |
          echo "=== Generated Packages ==="
          ls -la ./artifacts/*.nupkg
          
          echo "=== Package Contents ==="
          for pkg in ./artifacts/*.nupkg; do
            echo "--- $pkg ---"
            unzip -l "$pkg" | head -20
          done

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: preview
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Create GitHub Release (Preview)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Preview ${{ needs.version.outputs.version }}
          body: |
            ## Preview Release ${{ needs.version.outputs.version }}
            
            Esta es una versión de desarrollo automática generada desde la rama `develop`.
            
            ### Instalación
            ```bash
            dotnet add package CdCSharp.BlazorUI --version ${{ needs.version.outputs.version }}
            ```
            
            ### Notas
            - Versión calculada automáticamente
            - Commits desde último release: ${{ github.event.commits[0].message }}
            - SHA: ${{ github.sha }}
            
            ⚠️ **Esta versión es inestable y no debe usarse en producción.**
          prerelease: true
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [version, publish]
    if: always()
    steps:
      - name: Success notification
        if: needs.publish.result == 'success'
        run: |
          echo "✅ Preview ${{ needs.version.outputs.version }} publicada exitosamente"
          echo "📦 NuGet: https://www.nuget.org/packages/CdCSharp.BlazorUI/${{ needs.version.outputs.version }}"
          echo "🏷️ Release: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version.outputs.version }}"

      - name: Failure notification
        if: needs.publish.result == 'failure'
        run: |
          echo "❌ Falló la publicación de la preview"
          echo "Revisa los logs del workflow para más detalles"
