name: Build and Publish

on:
  push:
    branches: ['develop', 'main']
    tags: ['v*']
  pull_request:
    branches: ['main', 'develop']
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - release
      publish:
        description: 'Publish to NuGet'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  # Source of truth: global.json. CI-07 pins the SDK to a concrete minor to keep
  # builds reproducible across runs; local dev and CI converge on the same version.
  CONFIGURATION: 'Release'
  # Versionado base - modificar según tu proyecto
  MAJOR_VERSION: 1
  MINOR_VERSION: 0

# ARCH-16: restrict the default GITHUB_TOKEN to the minimum scopes this workflow needs.
# contents: write is required by softprops/action-gh-release to create the GitHub release.
# Everything else drops to read (checkout) or none.
permissions:
  contents: write

# ARCH-13: collapse overlapping runs for the same ref. A fast second push to `develop` supersedes
# the previous run so concurrent dotnet nuget push calls never race against each other.
# Tag publishes are never cancelled — they produce immutable release artifacts.
concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # CI-07: drive the SDK version from global.json so the workflow cannot float ahead of
          # what local dev uses (and vice versa).
          global-json-file: global.json
          # ARCH-14: cache the NuGet global packages folder keyed on all *.csproj hashes.
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        # BuildTools shells out to npm + vite. Pin Node LTS so CI doesn't drift with
        # ubuntu-latest's default. Closes the CI-09 prerequisite for BLD-PIPE-14.
        # No npm cache: package-lock.json is gitignored and regenerated on every build.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Determinar tipo de build y versión
      - name: Determine Version
        id: version
        run: |
          # Debug inicial
          echo "🔍 Debug: EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "🔍 Debug: GITHUB_REF=$GITHUB_REF"
          echo "🔍 Debug: version_type=${{ github.event.inputs.version_type }}"
          echo "🔍 Debug: publish=${{ github.event.inputs.publish }}"
          
          # Función para extraer versión del tag
          get_tag_version() {
            echo "${GITHUB_REF#refs/tags/v}"
          }
          
          # Variables por defecto
          SHOULD_PUBLISH="false"
          VERSION_SUFFIX=""
          
          # Lógica de versionado según el contexto
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            # Ejecución manual
            BASE_VERSION="${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ github.run_number }}"
            echo "🔍 Debug: Manual dispatch with version_type=${{ github.event.inputs.version_type }}"
            echo "🔍 Debug: Publish requested=${{ github.event.inputs.publish }}"
            
            if [[ "${{ github.event.inputs.version_type }}" == "preview" ]]; then
              VERSION="$BASE_VERSION-preview.${{ github.run_number }}"
              VERSION_SUFFIX="preview.${{ github.run_number }}"
            else
              VERSION="$BASE_VERSION"
            fi
            
            # Solo publicar si se solicitó explícitamente
            if [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
              SHOULD_PUBLISH="true"
              echo "✅ Manual build: $VERSION (will publish)"
            else
              SHOULD_PUBLISH="false"
              echo "🏗️ Manual build: $VERSION (no publish - test only)"
            fi
            
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag = Release oficial
            VERSION=$(get_tag_version)
            SHOULD_PUBLISH="true"
            echo "📦 Release version from tag: $VERSION"
            
          elif [[ "$GITHUB_REF" == "refs/heads/develop" && "$GITHUB_EVENT_NAME" == "push" ]]; then
            # Push a develop = Preview automático
            BASE_VERSION="${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ github.run_number }}"
            VERSION="$BASE_VERSION-preview.${{ github.run_number }}"
            VERSION_SUFFIX="preview.${{ github.run_number }}"
            SHOULD_PUBLISH="true"
            echo "🔬 Preview version for develop: $VERSION"
            
          elif [[ "$GITHUB_REF" == "refs/heads/main" && "$GITHUB_EVENT_NAME" == "push" ]]; then
            # Push a main = Solo build, no publicar
            VERSION="${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ github.run_number }}"
            SHOULD_PUBLISH="false"
            echo "🏗️ Build version for main (no publish): $VERSION"
            
          else
            # PR y otros casos = Solo build
            VERSION="${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ github.run_number }}-ci.${{ github.run_number }}"
            SHOULD_PUBLISH="false"
            echo "🔧 CI Build: $VERSION"
          fi
          
          # Debug final
          echo "📋 Final: VERSION=$VERSION, SHOULD_PUBLISH=$SHOULD_PUBLISH"
          
          # Exportar variables
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_suffix=$VERSION_SUFFIX" >> $GITHUB_OUTPUT
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT
          
          # Para otros steps
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHOULD_PUBLISH=$SHOULD_PUBLISH" >> $GITHUB_ENV

      - name: Display Build Info
        run: |
          echo "================================================"
          echo "🎯 Build Configuration:"
          echo "  📋 Version: ${{ steps.version.outputs.version }}"
          echo "  🔧 Branch/Ref: ${{ github.ref }}"
          echo "  📦 Will Publish: ${{ steps.version.outputs.should_publish }}"
          echo "  🏷️ Version Suffix: ${{ steps.version.outputs.version_suffix }}"
          echo "  🎬 Triggered by: ${{ github.event_name }}"
          echo "================================================"

      - name: Restore dependencies
        run: dotnet restore

      # Build en orden correcto (igual que tu pipeline original)
      - name: Build Projects
        run: |
          # 1. Build Analyzers
          echo "🔧 Building Analyzers..."
          dotnet build src/CdCSharp.BlazorUI.Core.CodeGeneration/CdCSharp.BlazorUI.Core.CodeGeneration.csproj \
            -c ${{ env.CONFIGURATION }} \
            -p:Version=${{ steps.version.outputs.version }} \
            --no-restore
          
          # 2. Build Core
          echo "🔧 Building Core..."
          dotnet build src/CdCSharp.BlazorUI.Core/CdCSharp.BlazorUI.Core.csproj \
            -c ${{ env.CONFIGURATION }} \
            -p:Version=${{ steps.version.outputs.version }} \
            --no-restore
          
          # 3. Build Main Project
          echo "🔧 Building Main Project..."
          dotnet build src/CdCSharp.BlazorUI/CdCSharp.BlazorUI.csproj \
            -c ${{ env.CONFIGURATION }} \
            -p:Version=${{ steps.version.outputs.version }} \
            --no-restore
          
          # 4. Build BuildTools
          echo "🔧 Building BuildTools..."
          dotnet build src/CdCSharp.BlazorUI.BuildTools/CdCSharp.BlazorUI.BuildTools.csproj \
            -c ${{ env.CONFIGURATION }} \
            -p:Version=${{ steps.version.outputs.version }} \
            --no-restore

      - name: Test
        run: |
          dotnet test \
            -c ${{ env.CONFIGURATION }} \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      # CI-08: surface TRX + coverage so a failing PR run is inspectable without opening the
      # Actions UI logs. `if: always()` keeps the upload on test failure too.
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.version.outputs.version }}
          path: ./test-results/**
          retention-days: 14
          if-no-files-found: warn

      # CI-04: pack always, push conditionally. This makes `dotnet pack` a PR gate so breaking
      # changes to PackageId/TargetFramework/IsPackable/deps/baseline validation are caught before
      # merge instead of surfacing on the next push to develop.
      - name: Pack NuGet Packages
        run: |
          echo "📦 Packing NuGet packages..."
          
          # Si hay suffix, usarlo
          if [[ -n "${{ steps.version.outputs.version_suffix }}" ]]; then
            SUFFIX_ARG="-p:VersionSuffix=${{ steps.version.outputs.version_suffix }}"
          else
            SUFFIX_ARG=""
          fi
          
          # Pack cada proyecto
          dotnet pack src/CdCSharp.BlazorUI.Core/CdCSharp.BlazorUI.Core.csproj \
            -c ${{ env.CONFIGURATION }} \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            $SUFFIX_ARG \
            --no-build

          dotnet pack src/CdCSharp.BlazorUI.SyntaxHighlight/CdCSharp.BlazorUI.SyntaxHighlight.csproj \
            -c ${{ env.CONFIGURATION }} \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            $SUFFIX_ARG \
            --no-build

          dotnet pack src/CdCSharp.BlazorUI/CdCSharp.BlazorUI.csproj \
            -c ${{ env.CONFIGURATION }} \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            $SUFFIX_ARG \
            --no-build

          dotnet pack src/CdCSharp.BlazorUI.Localization.Server/CdCSharp.BlazorUI.Localization.Server.csproj \
            -c ${{ env.CONFIGURATION }} \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            $SUFFIX_ARG \
            --no-build

          dotnet pack src/CdCSharp.BlazorUI.Localization.Wasm/CdCSharp.BlazorUI.Localization.Wasm.csproj \
            -c ${{ env.CONFIGURATION }} \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            $SUFFIX_ARG \
            --no-build

          dotnet pack src/CdCSharp.BlazorUI.FluentValidation/CdCSharp.BlazorUI.FormsFluentValidation.csproj \
            -c ${{ env.CONFIGURATION }} \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            $SUFFIX_ARG \
            --no-build

          # BuildTools si se publica como tool
          dotnet pack src/CdCSharp.BlazorUI.BuildTools/CdCSharp.BlazorUI.BuildTools.csproj \
            -c ${{ env.CONFIGURATION }} \
            -o ./artifacts \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            $SUFFIX_ARG \
            --no-build
          
          echo "📋 Generated packages:"
          ls -la ./artifacts/

      # CI-04: surface the packed .nupkg/.snupkg on every run so reviewers can download and
      # test-install from a PR before merge.
      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ steps.version.outputs.version }}
          path: ./artifacts/*.*nupkg
          if-no-files-found: error
          retention-days: 14

      # Publicar a NuGet solo si should_publish es true
      - name: Publish to NuGet
        if: steps.version.outputs.should_publish == 'true'
        run: |
          echo "🚀 Publishing to NuGet.org..."
          
          for package in ./artifacts/*.nupkg; do
            if [[ -f "$package" ]]; then
              echo "📤 Publishing: $(basename $package)"
              dotnet nuget push "$package" \
                -k ${{ secrets.NUGET_API_KEY }} \
                -s https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done
          
          echo "✅ Packages published successfully!"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🎉 Release ${{ steps.version.outputs.version }}

            ### 📦 Packages
            - CdCSharp.BlazorUI
            - CdCSharp.BlazorUI.Core
            - CdCSharp.BlazorUI.SyntaxHighlight
            - CdCSharp.BlazorUI.Localization.Server
            - CdCSharp.BlazorUI.Localization.Wasm
            - CdCSharp.BlazorUI.FluentValidation
            - CdCSharp.BlazorUI.BuildTools

            ### 🔧 Installation
            dotnet add package CdCSharp.BlazorUI --version ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: ./artifacts/*.nupkg

      - name: Summary
        run: |
          echo "## 📋 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 Configuration | ${{ env.CONFIGURATION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📤 Published | ${{ steps.version.outputs.should_publish }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Ref | ${{ github.ref }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.version.outputs.should_publish }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Published Packages" >> $GITHUB_STEP_SUMMARY
            echo "Packages are available on [NuGet.org](https://www.nuget.org/packages/CdCSharp.BlazorUI)" >> $GITHUB_STEP_SUMMARY
          fi