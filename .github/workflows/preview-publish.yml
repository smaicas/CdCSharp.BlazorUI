# .github/workflows/preview-publish.yml
# Publishes preview versions automatically on each push to develop
# Version calculated: X.Y+1.0-preview.N (N = commits since last tag on master)

name: Preview Publish

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

env:
  DOTNET_VERSION: '10.0.100'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

permissions:
  contents: write

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      full_version: ${{ steps.calc.outputs.full_version }}
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate preview version
        id: calc
        run: |
          # Get last tag on master (format vX.Y.Z)
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]" origin/master 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            echo "::warning::No release tag found on master. Using v0.0.0 as base."
            echo "::warning::Create an initial tag (e.g., git tag v0.0.0) to establish versioning."
            LAST_TAG="v0.0.0"
          fi
          
          echo "Last tag on master: $LAST_TAG"
          
          # Parse version
          MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LAST_TAG | cut -d. -f2)
          
          # Increment minor for preview
          NEXT_MINOR=$((MINOR + 1))
          
          # Count commits since last tag (handle when tag doesn't exist)
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git rev-list --count "$LAST_TAG"..HEAD)
          else
            COMMITS=$(git rev-list --count HEAD)
          fi
          
          # Build version
          VERSION="${MAJOR}.${NEXT_MINOR}.0-preview.${COMMITS}"
          FULL_VERSION="${MAJOR}.${NEXT_MINOR}.0-preview.${COMMITS}+${GITHUB_SHA:0:7}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          
          echo "Calculated version: $VERSION"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Build (Release)
        run: dotnet build CdCSharp.BlazorUI.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test CdCSharp.BlazorUI.slnx -c Release --no-build --verbosity normal

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore CdCSharp.BlazorUI.slnx

      - name: Pack packages
        run: |
          dotnet pack CdCSharp.BlazorUI.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.version.outputs.version }} \
            -p:FileVersion=${{ needs.version.outputs.version }} \
            -p:InformationalVersion=${{ needs.version.outputs.full_version }} \
            -p:ContinuousIntegrationBuild=true \
            -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version, pack]
    environment: preview
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages-${{ needs.version.outputs.version }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Create GitHub Release (Preview)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Preview ${{ needs.version.outputs.version }}
          body: |
            ## Preview Release ${{ needs.version.outputs.version }}
            
            Development version automatically built from `develop`.
            
            ```bash
            dotnet add package CdCSharp.BlazorUI --version ${{ needs.version.outputs.version }}
            ```
            
            ⚠️ **Unstable - do not use in production**
          prerelease: true
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
