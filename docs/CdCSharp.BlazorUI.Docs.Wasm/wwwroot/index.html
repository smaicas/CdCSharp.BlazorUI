<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CdCSharp.BlazorUI — A modern, theme-driven Blazor component library for .NET 10." />
    <meta name="theme-color" content="#c41236" />
    <title>BlazorUI — Official Documentation</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <link href="_content/CdCSharp.BlazorUI/css/blazorui.css" rel="stylesheet" />
    <link href="CdCSharp.BlazorUI.Docs.Wasm.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/docs.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="docs-bootstrap">
            <div class="docs-bootstrap__logo">
                <span class="docs-bootstrap__spark"></span>
            </div>
            <div class="docs-bootstrap__text">
                <strong>BlazorUI</strong>
                <span>Booting documentation&hellip;</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        window.__buiInstall = { deferred: null, installed: false, listeners: [] };
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__buiInstall.deferred = e;
            window.__buiInstall.listeners.forEach(fn => { try { fn(); } catch { } });
        });
        window.addEventListener('appinstalled', () => {
            window.__buiInstall.deferred = null;
            window.__buiInstall.installed = true;
            window.__buiInstall.listeners.forEach(fn => { try { fn(); } catch { } });
        });
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(() => { });
            });
        }
    </script>
</body>

</html>
